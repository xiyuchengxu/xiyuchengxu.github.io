<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{SUMMARY}}">
    <title>{{PAGE_TITLE}}</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="post-page">
    <header class="article-toolbar">
        <a class="back-link" href="../index.html" aria-label="返回首页">←</a>
        <span class="logo">YuCheng</span>
        <button class="theme-btn" id="themeToggle" aria-label="切换主题">
            <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true"></svg>
        </button>
    </header>
    <main class="article-shell">
        <article class="article-content">
            <header class="article-header">
                <h1>{{TITLE}}</h1>
                <time datetime="{{DATE}}">{{DATE}}</time>
                <div class="post-tags">{{TAGS}}</div>
            </header>
            <div class="markdown-body">{{CONTENT}}</div>
        </article>
    </main>
    <script src="../script.js"></script>
</body>
</html>
